<!DOCTYPE html>
<html lang="en">
  <head>
    <title>winghimjns.github.io</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; border: none; }
html {
  --light: #efefef;
  --dark: #333333;
  --gutter: 1.5rem;
  --font-family: Arial, sans-serif;
  --background-color: var(--light);
  --font-color: var(--dark);
  --dark-background-color: var(--font-color);
  --dark-font-color: var(--background-color);
  --font-size: 2.5rem;
  --font-size-mobile: 1.6rem;
  font-size: .625rem;
}
@media (prefers-color-scheme: dark) {
  html {
  --background-color: var(--dark);
  --font-color: var(--light);
    color-scheme: dark;
  }
}
body {
  font-size: var(--font-size);
  font-family: var(--font-family);
  background-color: var(--background-color);
  color: var(--font-color);
}
@media (max-width: 767px) {
  body { font-size: var(--font-size-mobile); }
}
.container {
  max-width: 104rem;
  padding: 0 var(--gutter);
  margin: 0 auto;
}
a {
  color: #ff1493; /* deeppink */
}
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hey! welcome to my github page.</h1>
      <p>
        This page is for experimental purpose.
        Please go <a href="https://winghimjns.com" target="_blank" rel="noopener noreferrer nofollow">winghimjns.com</a> to visit my homepage.
      </p>
    </div>
  </body>
</html>
